<!DOCTYPE html>
<html>
<head>
<title>Display Showcase</title>
<style>

.block {
  display: block;
  background: lightblue;
  margin: 5px;
}

.inline {
  display: inline;
  background: lightgreen;
}

.inline-block {
  display: inline-block;
  width: 100px;
  height: 50px;
  background: orange;
  margin: 5px;
}

/* Hide on mobile */
.hide-mobile {
  display: block;
}

@media (max-width: 600px) {
  .hide-mobile {
    display: none;
  }
}

</style>
</head>

<body>

<h2>Block</h2>
<div class="block">Block 1</div>
<div class="block">Block 2</div>

<h2>Inline</h2>
<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<h2>Inline-Block</h2>
<div class="inline-block">Box 1</div>
<div class="inline-block">Box 2</div>

<h2>Hidden Example</h2>
<p class="hide-mobile">Hidden on mobile screen</p>

</body>
</html>
